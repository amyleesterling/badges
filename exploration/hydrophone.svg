<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="450" height="450" viewBox="0 0 450 450" role="img" aria-labelledby="exploration-hydrophone-title exploration-hydrophone-desc">
  <title id="exploration-hydrophone-title">Exploration badge: Hydrophone</title>
  <desc id="exploration-hydrophone-desc">Hydrophone extends what the exploration track can detect and map.</desc>
  <defs>
